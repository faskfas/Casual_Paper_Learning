global:
  img_size: 128 

vae:
  image_channels: 3
  n_channels: 64
  ch_mults: [1, 2, 2, 4]
  is_attn: [False, False, True, True]
  n_blocks: 2
  z_channels: 4
  checkpoint_load_path: "ckpts/vae/vae_iter10000.pth"  # ckpts/vae/vae_iter10000.pth

ddpm_cfg:
  n_steps: 1000
  img_size: 16  # need to pre-compute based on vae
  checkpoint_load_path: "ckpts/ddpm_cfg/cfg_ddpm_unet_iter10000.pth"  # ckpts/ddpm_cfg/cfg_ddpm_unet_iter10000.pth

unet:
  image_channels: 4  # same as z_channels
  n_channels: 64
  ch_mults: [1, 2, 2, 4]
  is_attn: [False, False, True, True]
  n_blocks: 2
  n_classes: 2
  token_dropout_prob: 0.2

train_vae:
  batch_size: 2
  epochs: 10000
  lr: 0.00001
  dataset_dir: "./train"
  checkpoint_save_dir: "ckpts/vae/"
  disc_weight: 0.5
  perceptual_weight: 1.0
  kl_weight: 0.000001  # 0.000005
  autoencoder_acc_steps: 1
  disc_start: 5000

train_ddpm_cfg:
  batch_size: 2
  epochs: 100
  lr: 0.00002
  dataset_dir: "./train"
  checkpoint_save_dir: "ckpts/ddpm_cfg/"
  num_classes: 2
  img_size: 128
  