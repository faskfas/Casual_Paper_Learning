global:
  img_size: 64

vit:
  image_size: 64
  patch_size: 16
  num_classes: 2
  dim: 256
  depth: 6
  heads: 8
  mlp_dim: 1024
  dropout: 0.1
  emb_dropout: 0.1
  pretrained_checkpoint_load_path: "./ckpts/pretrained/vit_iter5000.pth"
  finetuned_checkpoint_load_path: "./ckpts/pretrained/vit_finetune_iter50.pth"

mae:
  decoder_dim: 256
  masking_ratio: 0.75
  decoder_depth: 1
  decoder_heads: 8
  decoder_dim_head: 64

pretrain:
  epochs: 5000
  lr: 0.001
  batch_size: 2
  train_dir: "./train"
  checkpoint_save_dir: "./ckpts/pretrained/"

fine_tune:
  epochs: 50
  lr: 0.0001
  batch_size: 2
  train_dir: "./train"
  checkpoint_save_dir: "./ckpts/pretrained/"
